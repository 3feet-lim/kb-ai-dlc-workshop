services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - customer-web
      - admin-web
    networks:
      - table-order-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/tableorder
      JWT_SECRET_KEY: dev-secret-key-change-in-production
      JWT_EXPIRATION_HOURS: "16"
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - table-order-network

  customer-web:
    build:
      context: ./customer-web
      dockerfile: Dockerfile
    networks:
      - table-order-network

  admin-web:
    build:
      context: ./admin-web
      dockerfile: Dockerfile
    networks:
      - table-order-network

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tableorder
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - table-order-network

volumes:
  pgdata:
  uploads:

networks:
  table-order-network:
    driver: bridge
